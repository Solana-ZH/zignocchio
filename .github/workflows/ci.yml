name: CI

on:
  push:
    branches: [main, "solana-zig-fork-0.16-backend"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.16.0"

jobs:
  # -------------------------------------------------------------------
  # Fast checks that work on stock Zig in public GitHub Actions.
  # The repository mainline is direct-SBF via the solana-zig fork, but
  # those full integration checks still require a fork binary that is
  # not yet published for CI consumption.
  # -------------------------------------------------------------------
  host-checks:
    name: host-checks (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig ${{ env.ZIG_VERSION }}
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Run Zig unit tests
        run: zig build test -Dskip-program-build=true

  # -------------------------------------------------------------------
  # Direct-SBF / fork-Zig placeholder. Full repo CI is:
  #   SOLANA_ZIG=/path/to/fork/zig bash tools/ci-fork-sbf.sh
  # We keep this job as an explicit reminder until prebuilt fork Zig
  # binaries are published for GitHub-hosted runners.
  # -------------------------------------------------------------------
  ci-fork-sbf-smoke:
    name: ci-fork-sbf-smoke (placeholder)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Fetch solana-zig fork binary
        run: |
          # Tag / URL not yet published — skip if missing.
          echo "solana-zig fork pre-built binaries are not yet published;"
          echo "this job is a placeholder until we ship them."
          echo "Track: https://github.com/DaviRain-Su/solana-zig-bootstrap/tree/solana-1.52-zig0.16"
          exit 0

  # -------------------------------------------------------------------
  # Formatting check — fast, always runs. Scoped to actively-maintained
  # files. `cli/src/template.zig` contains multi-line string templates
  # that `zig fmt` cannot parse; excluded until we rework it as a raw
  # file asset.
  # -------------------------------------------------------------------
  fmt-check:
    name: fmt-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: zig fmt --check (build.zig + examples)
        run: zig fmt --check build.zig examples/
